<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFX Shot Tracker Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Epilogue:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* CSS remains the same as your original, providing the sleek UI */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0c0e;--s1:#141416;--s2:#1a1a1d;--s3:#222226;--s4:#2a2a2f;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--border3:rgba(255,255,255,0.22);
  --text:#eeeee8;--muted:#7a7a76;--dim:#3e3e3a;
  --accent:#e8961e;--accent-d:#c07818;--accent-bg:rgba(232,150,30,0.1);
  --green:#4fa84a;--green-bg:rgba(79,168,74,0.1);
  --blue:#4a8fd8;--blue-bg:rgba(74,143,216,0.1);
  --red:#d44a3a;--red-bg:rgba(212,74,58,0.1);
  --font:'Epilogue',sans-serif;--mono:'IBM Plex Mono',monospace;
  --r:10px;--rsm:6px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;}
input,button,select{font-family:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px;}
.app{display:grid;grid-template-rows:52px 1fr;height:100vh;overflow:hidden;}
.topbar{display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--border);gap:12px;}
.logo{font-size:14px;font-weight:800;letter-spacing:0.05em;}
.logo em{color:var(--accent);font-style:normal;}
.top-steps{display:flex;align-items:center;gap:2px;margin-left:20px;}
.tstep{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;color:var(--dim);transition:all .2s;}
.tstep.active{color:var(--accent);background:var(--accent-bg);}
.tstep.done{color:var(--muted);}
.tstep-n{width:17px;height:17px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;}
.tstep.done .tstep-n{background:var(--green);border-color:var(--green);color:#fff;}
.tstep.active .tstep-n{background:var(--accent);border-color:var(--accent);color:#000;}
.top-r{margin-left:auto;display:flex;align-items:center;gap:10px;}
.auth-pill{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;}
.auth-pill.out{background:var(--s3);color:var(--muted);}
.auth-pill.in{background:var(--green-bg);color:var(--green);border:1px solid rgba(79,168,74,0.25);}
.auth-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.main{overflow-y:auto;overflow-x:hidden;}
.panel{max-width:900px;margin:0 auto;padding:28px 20px 80px;}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:14px;}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap;}
.card-title{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);}
.btn{height:34px;padding:0 16px;border-radius:var(--rsm);border:1px solid var(--border2);background:transparent;color:var(--text);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.btn:hover:not(:disabled){background:var(--s3);border-color:var(--border3);}
.btn-accent{background:var(--accent);border-color:transparent;color:#000;font-weight:700;}
.btn-sm{height:28px;padding:0 11px;font-size:11px;border-radius:5px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.field input[type=text]{width:100%;height:36px;padding:0 11px;background:var(--s2);border:1px solid var(--border2);border-radius:var(--rsm);color:var(--text);font-family:var(--mono);font-size:12px;outline:none;}
.field-hint{font-size:11px;color:var(--muted);margin-top:4px;}
.dz-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.dz{border:1.5px dashed var(--border2);border-radius:var(--r);padding:22px 16px;text-align:center;cursor:pointer;transition:all .15s;}
.dz:hover{border-color:var(--accent);background:var(--accent-bg);}
.dz.filled{border-style:solid;border-color:var(--green);background:var(--green-bg);}
.shots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:10px;max-height:500px;overflow-y:auto;}
.shot-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);overflow:hidden;position:relative;}
.shot-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-bottom:1px solid var(--border);}
.shot-id{font-size:11px;font-weight:700;font-family:var(--mono);}
.shot-frames{display:grid;grid-template-columns:1fr 1fr;}
.fcell{position:relative;height:54px;background:#000;}
.fcell img{width:100%;height:100%;object-fit:cover;}
.prog-wrap{background:var(--s3);border-radius:99px;height:4px;overflow:hidden;margin-bottom:14px;}
.prog-bar{height:100%;background:var(--accent);transition:width .35s;}
.log{background:#090909;border:1px solid var(--border);border-radius:var(--rsm);padding:10px 12px;max-height:240px;overflow-y:auto;font-family:var(--mono);font-size:10.5px;}
.ll-ok{color:var(--green);}
.ll-info{color:var(--blue);}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:100;display:none;align-items:center;justify-content:center;}
.modal{background:var(--s1);padding:24px;width:580px;border-radius:var(--r);}
#hv{position:fixed;left:-9999px;top:-9999px;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">VFX <em>TRACKER</em></div>
    <div class="top-steps">
      <div class="tstep active" id="ts1"><div class="tstep-n">1</div>Connect</div>
      <div class="tstep" id="ts2"><div class="tstep-n">2</div>Project</div>
      <div class="tstep" id="ts3"><div class="tstep-n">3</div>Review</div>
      <div class="tstep" id="ts4"><div class="tstep-n">4</div>Build</div>
    </div>
    <div class="top-r">
      <div class="auth-pill out" id="auth-pill"><div class="auth-dot"></div><span id="auth-lbl">Not connected</span></div>
      <button class="btn btn-accent btn-sm" id="btn-connect" onclick="saveAndAuth()">Connect Google</button>
    </div>
  </div>

  <div class="main"><div class="panel">
    <div class="card" id="sec-setup">
      <div class="card-hdr"><div class="card-title">Google Cloud Setup</div></div>
      <div class="field">
        <label>OAuth Client ID</label>
        <input type="text" id="cid-input" placeholder="xxxxxxxxxxxx.apps.googleusercontent.com"/>
      </div>
      <div class="btn-row"><button class="btn btn-accent" onclick="saveAndAuth()">Save &amp; Connect Google →</button></div>
    </div>

    <div class="card" id="sec-project" style="display:none;">
      <div class="card-hdr"><div class="card-title">Project Setup</div></div>
      <div class="dz-grid">
        <div class="dz" id="dz-v" onclick="document.getElementById('fi-v').click()">
          <div class="dz-title">Drop video here</div>
        </div>
        <input type="file" id="fi-v" accept="video/*" style="display:none">
        <div class="dz" id="dz-e" onclick="document.getElementById('fi-e').click()">
          <div class="dz-title">Drop EDL/XML (Optional)</div>
        </div>
        <input type="file" id="fi-e" accept=".edl,.xml" style="display:none">
      </div>
      <div class="field">
        <label>Project Name</label>
        <input type="text" id="proj-name" value="VFX_Project_2026">
      </div>
      <button class="btn btn-accent" id="btn-detect" disabled onclick="runDetection()">Detect Shots →</button>
      <div id="proj-hint" style="font-size:11px; margin-top:8px; color:var(--muted)">Upload video to begin.</div>
    </div>

    <div class="card" id="sec-review" style="display:none;">
      <div class="card-hdr"><div class="card-title">Shot Review</div><span id="shot-count-tag" class="auth-pill in">0 shots</span></div>
      <div class="shots-grid" id="shots-grid"></div>
      <div class="btn-row" style="margin-top:16px;">
        <button class="btn btn-accent" onclick="buildSheet()">Build Google Sheet →</button>
      </div>
    </div>

    <div class="card" id="sec-build" style="display:none;">
      <div class="card-hdr"><div class="card-title" id="build-msg">Building Sheet...</div></div>
      <div class="prog-wrap"><div class="prog-bar" id="build-bar" style="width:0%"></div></div>
      <div class="log" id="build-log"></div>
    </div>

    <div class="card" id="sec-done" style="display:none;">
      <div class="card-hdr"><div class="card-title">Complete</div></div>
      <a href="#" id="sheet-link" target="_blank" class="btn btn-accent">Open VFX Sheet</a>
    </div>
  </div></div>
</div>

<video id="hv" muted playsinline></video>

<script>
// --- CONFIG & STATE ---
const HARDCODED_CLIENT_ID = ''; 
const S = { token:null, clientId:null, videoFile:null, videoUrl:null, shots:[], ssId:null, folderId:null, projName:'', cutLabel:'VFX_v1' };

// --- TIMECODE HELPER ---
function secToTC(s, fps = 24) {
  const f = Math.floor((s % 1) * fps);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  return [h, m, sec].map(v => String(v).padStart(2, '0')).join(':') + ':' + String(f).padStart(2, '0');
}

// --- AUTH ---
async function saveAndAuth() {
  const cid = document.getElementById('cid-input').value.trim() || HARDCODED_CLIENT_ID;
  if(!cid) return;
  S.clientId = cid;
  google.accounts.oauth2.initTokenClient({
    client_id: S.clientId,
    scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets',
    callback: r => { S.token = r.access_token; onAuthed(); }
  }).requestAccessToken();
}

function onAuthed() {
  document.getElementById('sec-setup').style.display='none';
  document.getElementById('sec-project').style.display='block';
  document.getElementById('auth-pill').className='auth-pill in';
  document.getElementById('auth-lbl').textContent='Connected';
  setStep(2);
}

// --- DRAG & DROP ---
document.getElementById('fi-v').onchange = e => {
  const f = e.target.files[0];
  S.videoFile = f; S.videoUrl = URL.createObjectURL(f);
  document.getElementById('hv').src = S.videoUrl;
  document.getElementById('dz-v').classList.add('filled');
  document.getElementById('btn-detect').disabled = false;
};

// --- OPTIMIZED DETECTION (WEB WORKER) ---
async function runDetection() {
  const video = document.getElementById('hv');
  setStep(3);
  document.getElementById('proj-hint').textContent = "Analyzing pixels (Worker Active)...";

  // Using a Worker Blob so no external files are needed
  const workerCode = `
    onmessage = function(e) {
      const { data, width, height, thresh } = e.data;
      let diff = 0;
      if (globalThis.prev) {
        for (let i = 0; i < data.length; i += 4) {
          diff += Math.abs(data[i] - prev[i]) + Math.abs(data[i+1] - prev[i+1]) + Math.abs(data[i+2] - prev[i+2]);
        }
      }
      globalThis.prev = data;
      postMessage(diff / (width * height * 3) > thresh);
    };
  `;
  const blob = new Blob([workerCode], {type: 'application/javascript'});
  const worker = new Worker(URL.createObjectURL(blob));

  const dur = video.duration;
  const cuts = [0];
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 36;
  const ctx = canvas.getContext('2d');

  for (let t = 0.5; t < dur; t += 0.5) {
    video.currentTime = t;
    await new Promise(res => video.onseeked = res);
    ctx.drawImage(video, 0, 0, 64, 36);
    const imgData = ctx.getImageData(0,0,64,36).data;
    
    worker.postMessage({data: imgData, width: 64, height: 36, thresh: 25});
    const isCut = await new Promise(res => worker.onmessage = e => res(e.data));
    if (isCut) cuts.push(t);
  }
  cuts.push(dur);
  
  S.shots = cuts.slice(0, -1).map((c, i) => ({
    inSec: c, outSec: cuts[i+1], dur: cuts[i+1]-c, id: `SH${String(i*10).padStart(4, '0')}`
  }));

  // Extraction
  for(let s of S.shots) {
    video.currentTime = s.inSec;
    await new Promise(res => video.onseeked = res);
    s.startB64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
  }

  renderReview();
  document.getElementById('sec-project').style.display='none';
  document.getElementById('sec-review').style.display='block';
}

function renderReview() {
  const grid = document.getElementById('shots-grid');
  grid.innerHTML = S.shots.map(s => `
    <div class="shot-card">
      <div class="shot-hdr"><span>${s.id}</span><span>${s.dur.toFixed(1)}s</span></div>
      <div class="fcell"><img src="data:image/jpeg;base64,${s.startB64}"></div>
    </div>
  `).join('');
  document.getElementById('shot-count-tag').textContent = `${S.shots.length} shots`;
}

// --- OPTIMIZED GOOGLE SHEET BUILD (BATCHING) ---
async function buildSheet() {
  setStep(4);
  document.getElementById('sec-review').style.display='none';
  document.getElementById('sec-build').style.display='block';
  const log = (m, c) => {
    const l = document.getElementById('build-log');
    l.innerHTML += `<div class="ll-${c||'info'}">${m}</div>`;
    l.scrollTop = l.scrollHeight;
  };

  try {
    log("Creating Spreadsheet...");
    const ss = await gapi('POST', 'https://sheets.googleapis.com/v4/spreadsheets', {
      properties: { title: document.getElementById('proj-name').value + " VFX Tracker" },
      sheets: [{ properties: { title: S.cutLabel, gridProperties: { frozenRowCount: 1 } } }]
    });
    S.ssId = ss.spreadsheetId;

    log("Creating Drive Folder...");
    const folder = await gapi('POST', 'https://www.googleapis.com/drive/v3/files', {
      name: "Thumbnails_" + Date.now(), mimeType: 'application/vnd.google-apps.folder'
    });
    S.folderId = folder.id;

    const allRows = [];
    // Header
    allRows.push(["SHOT ID", "TIMECODE", "THUMBNAIL", "STATUS", "NOTES"]);

    for(let i=0; i < S.shots.length; i++) {
      const s = S.shots[i];
      log(`Uploading Frame ${s.id}...`);
      
      const imgId = await uploadImg(s.startB64, s.id + ".jpg", S.folderId);
      const thumbFormula = `=IMAGE("https://drive.google.com/uc?export=view&id=${imgId}")`;
      
      allRows.push([s.id, secToTC(s.inSec), thumbFormula, "PENDING", ""]);
      
      // OPTIMIZATION: Clear memory after upload
      document.getElementById('build-bar').style.width = ((i/S.shots.length)*100) + "%";
    }

    log("Sending Batch Update to Google...");
    await gapi('PUT', `https://sheets.googleapis.com/v4/spreadsheets/${S.ssId}/values/${S.cutLabel}!A1`, {
      values: allRows
    }, { valueInputOption: 'USER_ENTERED' });

    log("Done!", "ok");
    document.getElementById('sec-done').style.display='block';
    document.getElementById('sheet-link').href = `https://docs.google.com/spreadsheets/d/${S.ssId}/edit`;
  } catch(e) { log(e.message, 'err'); }
}

// --- HELPERS ---
async function gapi(method, url, body, params) {
  const u = params ? url + '?' + new URLSearchParams(params) : url;
  const r = await fetch(u, {
    method, headers: { 'Authorization': 'Bearer ' + S.token, 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : null
  });
  return r.json();
}

async function uploadImg(b64, name, parent) {
  const meta = JSON.stringify({ name, parents: [parent] });
  const blob = new Blob([Uint8Array.from(atob(b64), c => c.charCodeAt(0))], {type: 'image/jpeg'});
  const form = new FormData();
  form.append('metadata', new Blob([meta], { type: 'application/json' }));
  form.append('file', blob);
  const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
    method: 'POST', headers: { 'Authorization': 'Bearer ' + S.token }, body: form
  });
  const d = await r.json();
  // Set permission so =IMAGE formula works
  await fetch(`https://www.googleapis.com/drive/v3/files/${d.id}/permissions`, {
    method:'POST', headers:{'Authorization':'Bearer '+S.token,'Content-Type':'application/json'},
    body:JSON.stringify({type:'anyone',role:'reader'})
  });
  return d.id;
}

function setStep(n){[1,2,3,4].forEach(i=>{const el=document.getElementById('ts'+i);el.className='tstep'+(i<n?' done':i===n?' active':'');});}
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
